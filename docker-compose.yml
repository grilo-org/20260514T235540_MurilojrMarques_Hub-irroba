services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: hub-irroba-app
    container_name: hub-irroba-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - hub-irroba-network

  web:
    image: nginx:alpine
    container_name: hub-irroba-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hub-irroba-network

  db:
    image: mysql:8.0
    container_name: hub-irroba-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - hub-irroba-network
      
  redis:
    image: redis:alpine
    container_name: hub-irroba-redis
    networks:
      - hub-irroba-network

networks:
  hub-irroba-network:
    driver: bridge